[lazy-static]
module = "std::sync::LazyLock"
since = "1.80"

[once-cell]
module = "std::sync::OnceLock"
since = "1.70"

[try-from]
module = "std::convert::TryFrom"
since = "1.34"

[matches]
module = "std::matches!"
since = "1.42"

[num-cpus]
module = "std::thread::available_parallelism()"
since = "1.59"

[cfg-if]
module = "cfg! macro (always available)"
since = "1.0"
partial = true
note = "cfg-if provides a macro that wraps cfg!; std cfg! is the foundation"

[is-terminal-polyfill]
module = "std::io::IsTerminal"
since = "1.70"

[hermit-abi]
module = "std (hermit target support)"
since = "1.70"
partial = true
note = "low-level ABI crate rarely needed directly"
